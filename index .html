<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swara Footwear</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
header{
    background:#0a8f3d;
    color:white;
    padding:20px;
    text-align:center;
}
.hero{
    text-align:center;
    padding:40px;
}
.hero img{
    width:90%;
    max-width:900px;
    border-radius:10px;
}
.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:20px;
}
.products img{
    width:220px;
    border-radius:10px;
}
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>
<body>

<header>
<h1>Swara Footwear</h1>
<p>Quality Shoes for Everyone</p>
</header>

<div class="hero">
<h2>Welcome to Swara Footwear</h2>
<img src="banner.jpg" alt="Banner">
</div>

<div class="products">
<img src="shoe1.jpg" alt="Shoe 1">
<img src="shoe2.jpg" alt="Shoe 2">
<img src="shoe3.jpg" alt="Shoe 3">
</div>

<footer>
© 2026 Swara Footwear. All Rights Reserved.
</footer>

</body>
</html>
